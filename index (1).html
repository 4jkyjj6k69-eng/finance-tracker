const PLAN_META = {
  dec: { label: "Dez 2027", thesisStart: "Jul 2027", color: "#185FA5", bg: "#E6F1FB", border: "#B5D4F4" },
  sep: { label: "Sep 2027", thesisStart: "Apr 2027", color: "#854F0B", bg: "#FAEEDA", border: "#FAC775" },
};
const STATUS_MAP = {
  done:   { label: "Abgeschlossen", bg: "#EAF3DE", color: "#3B6D11", dot: "#639922" },
  active: { label: "Aktiv",         bg: "#E6F1FB", color: "#185FA5", dot: "#378ADD" },
  open:   { label: "Offen",         bg: "#F1EFE8", color: "#5F5E5A", dot: "#B4B2A9" },
};
const TODAY = new Date();

function parseGrade(str) {
  if (!str) return null;
  const n = parseFloat(str.replace(",", "."));
  if (isNaN(n) || n < 1.0 || n > 5.0) return null;
  return n;
}
function gradeColor(g) {
  const v = parseGrade(g);
  if (!v) return { bg: "var(--color-background-secondary)", text: "var(--color-text-secondary)" };
  if (v <= 1.5) return { bg: "#EAF3DE", text: "#3B6D11" };
  if (v <= 2.5) return { bg: "#E6F1FB", text: "#185FA5" };
  if (v <= 3.5) return { bg: "#FAEEDA", text: "#854F0B" };
  if (v <= 4.0) return { bg: "#FCEBEB", text: "#A32D2D" };
  return { bg: "#F7C1C1", text: "#791F1F" };
}
function gradeLabel(g) {
  const v = parseGrade(g);
  if (!v) return "";
  if (v <= 1.5) return "Sehr gut";
  if (v <= 2.5) return "Gut";
  if (v <= 3.5) return "Befriedigend";
  if (v <= 4.0) return "Ausreichend";
  return "Nicht bestanden";
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - TODAY) / 86400000);
}
function formatCountdown(days) {
  if (days === null) return null;
  if (days < 0) return { label: `${Math.abs(days)}d überfällig`, color: "#E24B4A" };
  if (days === 0) return { label: "Heute!", color: "#BA7517" };
  if (days <= 14) return { label: `${days} Tage`, color: "#E24B4A" };
  if (days <= 45) return { label: `${days} Tage`, color: "#BA7517" };
  const w = Math.floor(days / 7), r = days % 7;
  if (days < 90) return { label: `${w}w ${r > 0 ? r + "d" : ""}`.trim(), color: "#185FA5" };
  return { label: `~${Math.floor(days / 30)} Monate`, color: "#5F5E5A" };
}
function examWeeks(examStr) {
  const wo = examStr.match(/(\d+)\s*Wo/i);
  if (wo) return parseInt(wo[1]);
  const tag = examStr.match(/(\d+)\s*Tag/i);
  if (tag) return Math.ceil(parseInt(tag[1]) / 7);
  return 0;
}
function fmt(date) {
  return date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
}

// Reihenfolge der Module im Studienverlauf (nach geplanter Deadline sortiert).
// Das Startdatum eines Moduls = Deadline des vorherigen Moduls in der Kette.
// Nur das erste noch offene Modul startet "heute". Dadurch sind alle Heft-Termine
// fest rückwärts vom Zieltermin verankert und wandern NICHT mit dem heutigen Tag.
function getModuleStart(mod, plan, modData, allModules, getStatusFn) {
  const dlOf = m => {
    const u = plan === "dec" ? modData[m.id]?.dl_dec : modData[m.id]?.dl_sep;
    const d = plan === "dec" ? m.dl_dec : m.dl_sep;
    return (u !== undefined ? u : d) || null;
  };
  const myDl = dlOf(mod);
  if (!myDl) return new Date(TODAY);

  // Alle nicht-erledigten Module mit Deadline, sortiert nach Deadline
  const chain = allModules
    .filter(m => getStatusFn(m) !== "done" && dlOf(m))
    .sort((a, b) => new Date(dlOf(a)) - new Date(dlOf(b)));

  const idx = chain.findIndex(m => m.id === mod.id);
  if (idx <= 0) return new Date(TODAY); // erstes offenes Modul startet heute
  // sonst: Start = Deadline des vorherigen Moduls in der Kette
  const prevDl = dlOf(chain[idx - 1]);
  const prevDate = new Date(prevDl);
  // Falls vorheriges Modul schon in der Vergangenheit endet, lieber heute starten
  return prevDate > TODAY ? prevDate : new Date(TODAY);
}

// Berechnet feste Heft-Deadlines zwischen Modulstart und Modul-Deadline.
function computeHeftDates(mod, deadlineStr, startDate) {
  if (!deadlineStr) return [];
  const dlDate = new Date(deadlineStr);
  const start  = startDate ? new Date(startDate) : new Date(TODAY);
  const examW  = examWeeks(mod.exam);
  const studyEnd = mod.exam.toLowerCase().includes("klausur")
    ? dlDate
    : new Date(dlDate.getTime() - examW * 7 * 86400000);
  const totalMs = studyEnd - start;
  const n = mod.hefte.length;
  if (n === 0 || totalMs <= 0) return mod.hefte.map(() => null);
  return mod.hefte.map((_, i) => new Date(start.getTime() + ((i + 1) / n) * totalMs));
}

function ProgressChart({ modules, modData }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const months = [];
    let cur = new Date(2025, 9, 1);
    const end = new Date(2027, 11, 31);
    while (cur <= end) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1); }
    const labels = months.map(m => m.toLocaleDateString("de-DE", { month: "short", year: "2-digit" }));
    const buildPlan = (key) => months.map(m => modules.reduce((sum, mod) => {
      const userDl = key === "dec" ? modData[mod.id]?.dl_dec : modData[mod.id]?.dl_sep;
      const defDl  = key === "dec" ? mod.dl_dec : mod.dl_sep;
      const dl = userDl !== undefined ? userDl : defDl;
      return dl && new Date(dl) <= m ? sum + mod.ects : sum;
    }, 0));
    const doneEcts = modules.filter(m => (modData[m.id]?.status || m.defaultStatus) === "done").reduce((s, m) => s + m.ects, 0);
    const actualData = months.map(m => m <= TODAY ? doneEcts : null);
    const lastActualIdx = [...months].reverse().findIndex(m => m <= TODAY);
    const todayIdx = months.length - 1 - lastActualIdx;
    const pointRadii = months.map((_, i) => i === todayIdx ? 7 : 0);
    const baselineData = months.map((_, i) => Math.min(90, Math.round((i / 23) * 90)));
    const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const gridColor = isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.07)";
    const tickColor = "#888780";
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current.getContext("2d"), {
      type: "line",
      data: { labels, datasets: [
        { label: "Baseline Okt 25–Sep 27", data: baselineData, borderColor: "#B4B2A9", borderWidth: 1, borderDash: [2,3], stepped: false, fill: false, pointRadius: 0, tension: 0 },
        { label: "Ziel Dez 2027", data: buildPlan("dec"), borderColor: "#378ADD", borderWidth: 1.5, borderDash: [5,3], stepped: "before", fill: false, pointRadius: 0, tension: 0 },
        { label: "Ziel Sep 2027", data: buildPlan("sep"), borderColor: "#BA7517", borderWidth: 1.5, borderDash: [5,3], stepped: "before", fill: false, pointRadius: 0, tension: 0 },
        { label: "Aktuell", data: actualData, borderColor: "#639922", borderWidth: 2, pointRadius: pointRadii, pointBackgroundColor: "#639922", showLine: true, stepped: false, tension: 0, fill: false },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { title: ctx => ctx[0].label, label: ctx => `${ctx.dataset.label}: ${ctx.raw ?? "—"} ECTS` }, backgroundColor: isDark ? "#2C2C2A" : "#fff", titleColor: isDark ? "#c2c0b6" : "#3d3d3a", bodyColor: "#5F5E5A", borderColor: isDark ? "#444441" : "#D3D1C7", borderWidth: 1, padding: 10 },
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 }, maxTicksLimit: 12, maxRotation: 0 }, border: { display: false } },
          y: { min: 0, max: 90, grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 }, stepSize: 15 }, border: { display: false } },
        },
        animation: { duration: 300 },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [modules, modData]);
  return (
    <div style={{ marginBottom: 16, padding: "14px 16px", borderRadius: 12, border: "0.5px solid var(--color-border-tertiary)", background: "var(--color-background-primary)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)" }}>ECTS-Verlauf vs. Zielpläne</span>
        <div style={{ display: "flex", gap: 12, fontSize: 11, color: "var(--color-text-secondary)", flexWrap: "wrap" }}>
          {[["#B4B2A9","2,3","Baseline"],["#378ADD","5,3","Dez 2027"],["#BA7517","5,3","Sep 2027"]].map(([c,d,l]) => (
            <span key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <svg width="18" height="8"><line x1="0" y1="4" x2="18" y2="4" stroke={c} strokeWidth="1.5" strokeDasharray={d}/></svg>{l}
            </span>
          ))}
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="#639922"/></svg>Aktuell
          </span>
        </div>
      </div>
      <div style={{ position: "relative", width: "100%", height: 180 }}>
        <canvas ref={canvasRef}></canvas>
      </div>
    </div>
  );
}

function ModuleCard({ mod, data, plan, onUpdate, allModules, getStatusFn, modData }) {
  const [expanded, setExpanded] = useState(false);
  const status    = data.status || mod.defaultStatus;
  const dl_dec    = data.dl_dec !== undefined ? data.dl_dec : mod.dl_dec;
  const dl_sep    = data.dl_sep !== undefined ? data.dl_sep : mod.dl_sep;
  const deadline  = plan === "dec" ? dl_dec : dl_sep;
  const hefteDone = data.hefteDone || [];
  const grade     = data.grade || "";
  const days      = daysUntil(deadline);
  const cd        = formatCountdown(days);
  const st        = STATUS_MAP[status];
  const gc        = gradeColor(grade);
  const progress  = status === "done" ? 100 : Math.round((hefteDone.length / mod.hefte.length) * 100);
  const pm        = PLAN_META[plan];
  // Automatisches Startdatum aus der Modulkette (Deadline des Vormoduls)
  const autoStart = getModuleStart(mod, plan, modData, allModules, getStatusFn);
  const heftDates = computeHeftDates(mod, deadline, autoStart);

  return (
    <div style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, background: "var(--color-background-primary)", overflow: "hidden" }}>
      <div onClick={() => setExpanded(e => !e)} style={{ padding: "12px 16px", cursor: "pointer", userSelect: "none" }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
          <div style={{ minWidth: 28, height: 28, borderRadius: "50%", background: st.bg, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: st.dot }} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" }}>{mod.id}. {mod.name}</span>
              <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: mod.type === "Wahlpflicht" ? "#FAEEDA" : "#E6F1FB", color: mod.type === "Wahlpflicht" ? "#854F0B" : "#185FA5", fontWeight: 500 }}>{mod.type}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 4, flexWrap: "wrap" }}>
              <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{mod.ects} ECTS · {mod.exam} · {mod.hefte.length} Heft{mod.hefte.length > 1 ? "e" : ""}</span>
              {cd && status !== "done" && <span style={{ fontSize: 11, fontWeight: 500, color: cd.color, background: pm.bg, padding: "1px 6px", borderRadius: 4 }}>{pm.label}: {cd.label}</span>}
            </div>
            {status !== "done" && (
              <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 140, height: 4, borderRadius: 2, background: "var(--color-background-secondary)", overflow: "hidden" }}>
                  <div style={{ width: `${progress}%`, height: "100%", borderRadius: 2, background: progress > 0 ? "#378ADD" : "transparent" }} />
                </div>
                <span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>{hefteDone.length}/{mod.hefte.length} Hefte</span>
              </div>
            )}
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 5 }}>
            <div style={{ fontSize: 11, color: st.color, background: st.bg, padding: "2px 8px", borderRadius: 4, fontWeight: 500 }}>{st.label}</div>
            {grade && parseGrade(grade) && <div style={{ fontSize: 12, fontWeight: 500, background: gc.bg, color: gc.text, padding: "2px 8px", borderRadius: 4 }}>Note {grade}</div>}
          </div>
          <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", alignSelf: "center" }}>{expanded ? "▲" : "▼"}</div>
        </div>
      </div>

      {expanded && (
        <div style={{ padding: "0 16px 16px", borderTop: "0.5px solid var(--color-border-tertiary)" }}>
          <div style={{ paddingTop: 12, display: "grid", gap: 10 }}>
            {/* Status */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <label style={{ fontSize: 12, color: "var(--color-text-secondary)", minWidth: 80 }}>Status:</label>
              <div style={{ display: "flex", gap: 6 }}>
                {["open","active","done"].map(s => (
                  <button key={s} onClick={() => onUpdate({ status: s })} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 6, cursor: "pointer", border: `1px solid ${status === s ? STATUS_MAP[s].dot : "var(--color-border-tertiary)"}`, background: status === s ? STATUS_MAP[s].bg : "transparent", color: status === s ? STATUS_MAP[s].color : "var(--color-text-secondary)", fontWeight: status === s ? 500 : 400 }}>{STATUS_MAP[s].label}</button>
                ))}
              </div>
            </div>
            {/* Note */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <label style={{ fontSize: 12, color: "var(--color-text-secondary)", minWidth: 80 }}>Note:</label>
              <input type="text" value={grade} onChange={e => onUpdate({ grade: e.target.value })} placeholder="z.B. 2,1" maxLength={4} style={{ width: 72, fontSize: 13, fontWeight: 500, padding: "4px 10px", borderRadius: 6, textAlign: "center", border: `1px solid ${parseGrade(grade) ? gradeColor(grade).text : "var(--color-border-secondary)"}`, background: parseGrade(grade) ? gradeColor(grade).bg : "var(--color-background-secondary)", color: parseGrade(grade) ? gradeColor(grade).text : "var(--color-text-primary)", outline: "none" }} />
              {parseGrade(grade) && <span style={{ fontSize: 11, color: gradeColor(grade).text }}>{gradeLabel(grade)} · {mod.weight}% Gewichtung</span>}
              {grade && !parseGrade(grade) && <span style={{ fontSize: 11, color: "#E24B4A" }}>Ungültig (1,0–5,0)</span>}
            </div>
            {/* Deadlines */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {["dec","sep"].map(p => {
                const pmeta = PLAN_META[p];
                const isActive = plan === p;
                const stored = p === "dec" ? data.dl_dec : data.dl_sep;
                const current = p === "dec" ? dl_dec : dl_sep;
                const defVal = p === "dec" ? mod.dl_dec : mod.dl_sep;
                const changed = stored !== undefined && stored !== defVal;
                const d = daysUntil(current); const c = formatCountdown(d);
                return (
                  <div key={p} style={{ padding: "10px 12px", borderRadius: 8, background: isActive ? pmeta.bg : "var(--color-background-secondary)", border: `${isActive ? "1px" : "0.5px"} solid ${isActive ? pmeta.border : "var(--color-border-tertiary)"}` }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 10, fontWeight: 500, color: pmeta.color }}>Ziel {pmeta.label}</span>
                      {changed && <button onClick={() => onUpdate({ [p === "dec" ? "dl_dec" : "dl_sep"]: undefined })} style={{ fontSize: 10, color: "var(--color-text-tertiary)", background: "none", border: "none", cursor: "pointer", padding: 0 }}>↺ reset</button>}
                    </div>
                    <input type="date" value={current || ""} onChange={e => onUpdate({ [p === "dec" ? "dl_dec" : "dl_sep"]: e.target.value })} style={{ width: "100%", fontSize: 12, padding: "4px 6px", borderRadius: 6, boxSizing: "border-box", border: `0.5px solid ${changed ? pmeta.border : "var(--color-border-secondary)"}`, background: changed ? pmeta.bg : "var(--color-background-primary)", color: "var(--color-text-primary)", cursor: "pointer", fontWeight: changed ? 500 : 400 }} />
                    {c && current && <div style={{ fontSize: 11, color: c.color, marginTop: 4 }}>{c.label}</div>}
                  </div>
                );
              })}
            </div>
            {/* Modulstart (automatisch aus Modulkette berechnet) */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <label style={{ fontSize: 12, color: "var(--color-text-secondary)", minWidth: 80 }}>Modulstart:</label>
              <span style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", background: "var(--color-background-secondary)", padding: "4px 10px", borderRadius: 6 }}>
                {autoStart.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })}
              </span>
              <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>
                automatisch berechnet · Start = Ende des Vormoduls
              </span>
            </div>
            {/* Hefte */}
            <div>
              <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 8 }}>
                Studienhefte
                {deadline && status !== "done" && (() => {
                  const examW = examWeeks(mod.exam);
                  const dlDate = new Date(deadline);
                  const studyEnd = mod.exam.toLowerCase().includes("klausur") ? dlDate : new Date(dlDate.getTime() - examW * 7 * 86400000);
                  const studyW = Math.max(0, (studyEnd - autoStart) / (7 * 86400000));
                  const wph = mod.hefte.length > 0 ? (studyW / mod.hefte.length).toFixed(1) : 0;
                  return <span style={{ marginLeft: 8, fontSize: 11, color: "var(--color-text-tertiary)", fontWeight: 400 }}>· {wph} Wo./Heft{!mod.exam.toLowerCase().includes("klausur") && examW > 0 ? ` (${examW} Wo. Prüfungszeit abgezogen)` : ""}</span>;
                })()}
              </div>
              <div style={{ display: "grid", gap: 6 }}>
                {mod.hefte.map((heft, i) => {
                  const done = status === "done" || hefteDone.includes(i);
                  let heftDl = null, heftCd = null;
                  if (deadline && status !== "done" && heftDates[i]) {
                    heftDl = heftDates[i];
                    heftCd = formatCountdown(Math.ceil((heftDl - TODAY) / 86400000));
                  }
                  const heftPages = data[`heft_pages_${i}`] || "";
                  const heftPagesDone = data[`heft_pagesdone_${i}`] || "";
                  const totalPg = parseInt(heftPages) || 0;
                  const donePg = parseInt(heftPagesDone) || 0;
                  const pagePct = totalPg > 0 ? Math.min(100, Math.round((donePg / totalPg) * 100)) : 0;
                  return (
                    <div key={i} style={{ borderRadius: 8, background: done ? "#EAF3DE" : "var(--color-background-secondary)", border: `0.5px solid ${done ? "#C0DD97" : "var(--color-border-tertiary)"}`, overflow: "hidden" }}>
                      <div onClick={() => { if (status === "done") return; const next = done ? hefteDone.filter(x => x !== i) : [...hefteDone, i]; onUpdate({ hefteDone: next }); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", cursor: status === "done" ? "default" : "pointer" }}>
                        <div style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0, background: done ? "#639922" : "transparent", border: `1.5px solid ${done ? "#639922" : "var(--color-border-secondary)"}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {done && <span style={{ color: "#fff", fontSize: 10 }}>✓</span>}
                        </div>
                        <span style={{ fontSize: 12, flex: 1, color: done ? "#3B6D11" : "var(--color-text-primary)", fontWeight: 500 }}>Heft {i + 1}: {heft}</span>
                        {heftDl && !done && (
                          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 1, flexShrink: 0 }}>
                            <span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>{fmt(heftDl)}</span>
                            {heftCd && <span style={{ fontSize: 10, fontWeight: 500, color: heftCd.color }}>{heftCd.label}</span>}
                          </div>
                        )}
                      </div>
                      {!done && (
                        <div style={{ padding: "0 12px 10px", display: "flex", alignItems: "center", gap: 8 }} onClick={e => e.stopPropagation()}>
                          <input type="number" min="0" placeholder="Seiten gelesen" value={heftPagesDone}
                            onChange={e => { const val = e.target.value; const pg = parseInt(val)||0; const tot = parseInt(heftPages)||0; const patch = {[`heft_pagesdone_${i}`]: val}; if (tot > 0 && pg >= tot && !hefteDone.includes(i)) patch.hefteDone = [...hefteDone, i]; onUpdate(patch); }}
                            style={{ width: 90, fontSize: 11, padding: "3px 7px", borderRadius: 6, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)" }} />
                          <span style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>/</span>
                          <input type="number" min="0" placeholder="Seiten gesamt" value={heftPages}
                            onChange={e => { const val = e.target.value; const tot = parseInt(val)||0; const pg = parseInt(heftPagesDone)||0; const patch = {[`heft_pages_${i}`]: val}; if (tot > 0 && pg >= tot && !hefteDone.includes(i)) patch.hefteDone = [...hefteDone, i]; onUpdate(patch); }}
                            style={{ width: 90, fontSize: 11, padding: "3px 7px", borderRadius: 6, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)" }} />
                          {totalPg > 0 && (
                            <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6 }}>
                              <div style={{ flex: 1, height: 4, borderRadius: 2, background: "var(--color-background-primary)", overflow: "hidden" }}>
                                <div style={{ width: `${pagePct}%`, height: "100%", borderRadius: 2, background: pagePct >= 100 ? "#639922" : "#378ADD", transition: "width 0.3s" }} />
                              </div>
                              <span style={{ fontSize: 10, color: "var(--color-text-tertiary)", minWidth: 28 }}>{pagePct}%</span>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
            {/* Notizen */}
            <div>
              <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 4 }}>Notizen:</div>
              <textarea value={data.notes || ""} onChange={e => onUpdate({ notes: e.target.value })} placeholder="Eigene Notizen..." rows={2} style={{ width: "100%", fontSize: 12, padding: "8px 10px", borderRadius: 8, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-secondary)", color: "var(--color-text-primary)", resize: "vertical", boxSizing: "border-box", fontFamily: "var(--font-sans)" }} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [modData, setModData]           = useState({});
  const [loaded, setLoaded]             = useState(false);
  const [filter, setFilter]             = useState("all");
  const [plan, setPlan]                 = useState("dec");
  const [wpSelected, setWpSelected]     = useState([]);
  const [wpOpen, setWpOpen]             = useState(false);
  const [vacationWeeks, setVacationWeeks] = useState(0);
  const [vacOpen, setVacOpen]           = useState(false);
  const [saving, setSaving]             = useState(false);

  const WP_MODULES = MODULES.filter(m => m.type === "Wahlpflicht");

  useEffect(() => {
    const saved = lsGet();
    if (saved) {
      setModData(saved.modData || {});
      setPlan(saved.plan || "dec");
      setWpSelected(saved.wpSelected || []);
      setVacationWeeks(saved.vacationWeeks || 0);
    }
    setLoaded(true);
  }, []);

  const save = useCallback((data, p, wp, vw) => {
    setSaving(true);
    lsSet({ modData: data, plan: p, wpSelected: wp, vacationWeeks: vw });
    setTimeout(() => setSaving(false), 600);
  }, []);

  const updateMod = useCallback((id, patch) => {
    setModData(prev => {
      const next = { ...prev, [id]: { ...(prev[id] || {}), ...patch } };
      save(next, plan, wpSelected, vacationWeeks);
      return next;
    });
  }, [save, plan, wpSelected, vacationWeeks]);

  const switchPlan = p => { setPlan(p); save(modData, p, wpSelected, vacationWeeks); };
  const toggleWp = id => {
    setWpSelected(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : prev.length < 2 ? [...prev, id] : prev;
      save(modData, plan, next, vacationWeeks);
      return next;
    });
  };
  const updateVacation = v => {
    const vw = Math.max(0, Math.min(52, v));
    setVacationWeeks(vw);
    save(modData, plan, wpSelected, vw);
  };

  const effectiveModules = MODULES.filter(m => m.type === "Pflicht" || wpSelected.includes(m.id));
  const getStatus = mod => modData[mod.id]?.status || mod.defaultStatus;
  const doneEcts   = effectiveModules.filter(m => getStatus(m) === "done").reduce((s, m) => s + m.ects, 0);
  const totalEcts  = MODULES.filter(m => m.type === "Pflicht").reduce((s, m) => s + m.ects, 0) + wpSelected.length * 6;
  const pct        = totalEcts > 0 ? Math.round((doneEcts / totalEcts) * 100) : 0;
  const activeCount = effectiveModules.filter(m => getStatus(m) === "active").length;
  const targetDate = new Date(plan === "dec" ? "2027-12-31" : "2027-09-30");
  const vacDaysOff  = vacationWeeks * 7;
  const rawDaysLeft = Math.ceil((targetDate - TODAY) / 86400000);
  const daysLeft    = Math.max(0, rawDaysLeft - vacDaysOff);
  const weeksLeft   = Math.floor(daysLeft / 7);
  const pm = PLAN_META[plan];

  const urgentModules = effectiveModules.filter(m => {
    if (getStatus(m) === "done") return false;
    const dl = plan === "dec" ? (modData[m.id]?.dl_dec !== undefined ? modData[m.id].dl_dec : m.dl_dec) : (modData[m.id]?.dl_sep !== undefined ? modData[m.id].dl_sep : m.dl_sep);
    const d = daysUntil(dl);
    return d !== null && d <= 14;
  });

  const weekEnd = new Date(TODAY.getTime() + 7 * 86400000);
  const thisWeekHefte = [];
  effectiveModules.forEach(mod => {
    if (getStatus(mod) === "done") return;
    const dl = plan === "dec" ? (modData[mod.id]?.dl_dec !== undefined ? modData[mod.id]?.dl_dec : mod.dl_dec) : (modData[mod.id]?.dl_sep !== undefined ? modData[mod.id]?.dl_sep : mod.dl_sep);
    if (!dl) return;
    const heftDates = computeHeftDates(mod, dl, getModuleStart(mod, plan, modData, effectiveModules, getStatus));
    const hefteDone = modData[mod.id]?.hefteDone || [];
    mod.hefte.forEach((heft, i) => {
      if (hefteDone.includes(i) || !heftDates[i]) return;
      const heftDate = heftDates[i];
      if (heftDate >= TODAY && heftDate <= weekEnd) thisWeekHefte.push({ modName: mod.name, heftName: heft, idx: i + 1, date: heftDate });
    });
  });

  const gradedModules = effectiveModules.filter(m => parseGrade(modData[m.id]?.grade) !== null);
  const hasGrades = gradedModules.length > 0;
  const totalW    = gradedModules.reduce((s, m) => s + m.weight, 0);
  const weightedS = gradedModules.reduce((s, m) => s + parseGrade(modData[m.id].grade) * m.weight, 0);
  const avgGrade  = hasGrades ? weightedS / totalW : null;
  const avgStr    = avgGrade ? avgGrade.toFixed(2).replace(".", ",") : null;

  const filtered = effectiveModules.filter(m => {
    const s = getStatus(m);
    if (filter === "pflicht") return m.type === "Pflicht";
    if (filter === "wahl")    return m.type === "Wahlpflicht";
    if (filter === "active")  return s === "active";
    if (filter === "open")    return s === "open";
    if (filter === "done")    return s === "done";
    return true;
  });

  const exportBackup = () => {
    const blob = new Blob([JSON.stringify({ modData, plan, wpSelected, vacationWeeks }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `tracker-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const exportIcs = () => {
    const toIcsDate = dl => dl.replace(/-/g,"") + "T120000Z";
    const toIcsDateTime = date => date.toISOString().replace(/[-:]/g,"").split(".")[0] + "Z";
    const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Finance M.Sc. Tracker//DE","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
    const seq = new Date().getTime().toString().slice(-4);

    effectiveModules.forEach(mod => {
      const dl = plan === "dec" ? (modData[mod.id]?.dl_dec !== undefined ? modData[mod.id].dl_dec : mod.dl_dec) : (modData[mod.id]?.dl_sep !== undefined ? modData[mod.id].dl_sep : mod.dl_sep);
      const status = getStatus(mod);
      if (status === "done") return;

      // Modul-Deadline
      if (dl) {
        lines.push(
          "BEGIN:VEVENT",
          `UID:modul-${mod.id}-${plan}@finance-tracker`,
          `DTSTAMP:${toIcsDate(new Date().toISOString().slice(0,10))}`,
          `DTSTART;VALUE=DATE:${dl.replace(/-/g,"")}`,
          `DTEND;VALUE=DATE:${dl.replace(/-/g,"")}`,
          `SUMMARY:📚 ${mod.name} – Deadline`,
          `DESCRIPTION:${mod.exam} · ${mod.ects} ECTS`,
          `SEQUENCE:${seq}`,
          "BEGIN:VALARM","TRIGGER:-P14D","ACTION:DISPLAY",`DESCRIPTION:14 Tage bis: ${mod.name}`,"END:VALARM",
          "BEGIN:VALARM","TRIGGER:-P7D","ACTION:DISPLAY",`DESCRIPTION:7 Tage bis: ${mod.name}`,"END:VALARM",
          "END:VEVENT"
        );
      }

      // Pro-Heft-Deadlines
      if (dl) {
        const heftDates = computeHeftDates(mod, dl, getModuleStart(mod, plan, modData, effectiveModules, getStatus));
        const hefteDone = modData[mod.id]?.hefteDone || [];

        mod.hefte.forEach((heft, i) => {
          if (hefteDone.includes(i) || !heftDates[i]) return; // erledigt oder kein Datum
          const dateStr = heftDates[i].toISOString().slice(0,10).replace(/-/g,"");
          lines.push(
            "BEGIN:VEVENT",
            `UID:modul-${mod.id}-heft-${i}-${plan}@finance-tracker`,
            `DTSTAMP:${toIcsDate(new Date().toISOString().slice(0,10))}`,
            `DTSTART;VALUE=DATE:${dateStr}`,
            `DTEND;VALUE=DATE:${dateStr}`,
            `SUMMARY:📖 Heft ${i+1}: ${heft.length > 40 ? heft.slice(0,40)+"…" : heft}`,
            `DESCRIPTION:Modul: ${mod.name}\\nHeft ${i+1} von ${mod.hefte.length}: ${heft}`,
            `SEQUENCE:${seq}`,
            "BEGIN:VALARM","TRIGGER:-P3D","ACTION:DISPLAY",`DESCRIPTION:3 Tage bis Heft ${i+1}: ${mod.name}`,"END:VALARM",
            "END:VEVENT"
          );
        });
      }
    });

    lines.push("END:VCALENDAR");
    const blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `finance-deadlines-${plan}-${new Date().toISOString().slice(0,10)}.ics`; a.click();
    URL.revokeObjectURL(url);
  };

  if (!loaded) return <div style={{ padding: "2rem", color: "var(--color-text-secondary)" }}>Lade Daten…</div>;

  return (
    <div style={{ padding: "0" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 14, gap: 12 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 500, color: "var(--color-text-primary)" }}>Finance M.Sc. Tracker</div>
          <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginTop: 2 }}>Euro-FH · Start Okt 2025</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
          <div style={{ display: "flex", background: "var(--color-background-secondary)", borderRadius: 8, padding: 3, gap: 3 }}>
            {["dec","sep"].map(p => <button key={p} onClick={() => switchPlan(p)} style={{ fontSize: 12, fontWeight: plan === p ? 500 : 400, padding: "5px 14px", borderRadius: 6, cursor: "pointer", border: `1px solid ${plan === p ? PLAN_META[p].border : "transparent"}`, background: plan === p ? PLAN_META[p].bg : "transparent", color: plan === p ? PLAN_META[p].color : "var(--color-text-secondary)" }}>Ziel {PLAN_META[p].label}</button>)}
          </div>
          <div style={{ fontSize: 10, color: saving ? "#185FA5" : "var(--color-text-tertiary)" }}>{saving ? "Gespeichert ✓" : "Auto-save aktiv"}</div>
        </div>
      </div>

      {/* Durchschnittsnote */}
      {hasGrades && (
        <div style={{ background: avgGrade <= 1.5 ? "#EAF3DE" : avgGrade <= 3.0 ? "#E6F1FB" : "#FAEEDA", border: `1px solid ${avgGrade <= 1.5 ? "#C0DD97" : avgGrade <= 3.0 ? "#B5D4F4" : "#FAC775"}`, borderRadius: 12, padding: "14px 20px", marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 500, color: avgGrade <= 1.5 ? "#3B6D11" : avgGrade <= 3.0 ? "#185FA5" : "#854F0B", marginBottom: 3 }}>Gewichtete Durchschnittsnote</div>
            <div style={{ fontSize: 10, color: avgGrade <= 1.5 ? "#639922" : avgGrade <= 3.0 ? "#378ADD" : "#BA7517" }}>{gradedModules.length} Modul{gradedModules.length !== 1 ? "e" : ""} benotet · gewichtet nach ECTS-Anteil</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 36, fontWeight: 500, color: avgGrade <= 1.5 ? "#3B6D11" : avgGrade <= 3.0 ? "#185FA5" : "#854F0B", lineHeight: 1.1 }}>{avgStr}</div>
            <div style={{ fontSize: 11, color: avgGrade <= 1.5 ? "#639922" : avgGrade <= 3.0 ? "#378ADD" : "#BA7517", marginTop: 2 }}>{avgGrade <= 1.5 ? "Sehr gut" : avgGrade <= 2.5 ? "Gut" : avgGrade <= 3.5 ? "Befriedigend" : "Ausreichend"}</div>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 10 }}>
        {[
          { val: `${doneEcts}/${totalEcts}`, lbl: "ECTS", sub: `${pct}% abgeschlossen` },
          { val: `${weeksLeft}w`, lbl: `bis ${pm.label}`, sub: `${daysLeft} Tage` },
          { val: `${activeCount}`, lbl: "Aktiv", sub: "in Bearbeitung" },
          { val: avgStr || "—", lbl: "Ø Note", sub: hasGrades ? `${gradedModules.length} benotet` : "noch keine" },
        ].map((s, i) => (
          <div key={i} style={{ background: "var(--color-background-secondary)", borderRadius: 10, padding: "10px 12px" }}>
            <div style={{ fontSize: 20, fontWeight: 500, color: "var(--color-text-primary)", lineHeight: 1.1 }}>{s.val}</div>
            <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 2 }}>{s.lbl}</div>
            <div style={{ fontSize: 10, color: "var(--color-text-tertiary)", marginTop: 1 }}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Progress bar */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <div style={{ flex: 1, height: 5, borderRadius: 3, background: "var(--color-background-secondary)", overflow: "hidden" }}>
          <div style={{ width: `${pct}%`, height: "100%", borderRadius: 3, background: "#639922", transition: "width 0.4s" }} />
        </div>
        <span style={{ fontSize: 11, color: "var(--color-text-secondary)", minWidth: 32 }}>{pct}%</span>
      </div>

      {/* Plan info */}
      <div style={{ background: pm.bg, border: `0.5px solid ${pm.border}`, borderRadius: 8, padding: "8px 14px", marginBottom: 12, fontSize: 12, color: pm.color }}>
        <span style={{ fontWeight: 500 }}>Aktiver Plan: Ziel {pm.label}</span> · Thesis-Start: {pm.thesisStart}
        {plan === "sep" && <span style={{ marginLeft: 8, fontSize: 11, opacity: 0.8 }}>⚠ Erfordert ~28h/Woche</span>}
      </div>

      {/* Urlaub */}
      <div style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
        <div onClick={() => setVacOpen(o => !o)} style={{ padding: "9px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--color-background-secondary)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)" }}>Urlaubspause</span>
            {vacationWeeks > 0 && <span style={{ fontSize: 11, padding: "1px 7px", borderRadius: 4, background: "#FAEEDA", color: "#854F0B", fontWeight: 500 }}>{vacationWeeks} Wo. abgezogen · noch {weeksLeft} Wo. effektiv</span>}
          </div>
          <span style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>{vacOpen ? "▲" : "▼"}</span>
        </div>
        {vacOpen && (
          <div style={{ padding: "10px 14px 14px", borderTop: "0.5px solid var(--color-border-tertiary)" }}>
            <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 10 }}>Geplante Urlaubswochen werden von der verbleibenden Studienzeit abgezogen.</div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={() => updateVacation(vacationWeeks - 1)} style={{ width: 28, height: 28, borderRadius: 6, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", cursor: "pointer", fontSize: 16 }}>−</button>
              <div style={{ textAlign: "center", minWidth: 80 }}>
                <div style={{ fontSize: 20, fontWeight: 500 }}>{vacationWeeks}</div>
                <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>Wochen Urlaub</div>
              </div>
              <button onClick={() => updateVacation(vacationWeeks + 1)} style={{ width: 28, height: 28, borderRadius: 6, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", cursor: "pointer", fontSize: 16 }}>+</button>
              <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginLeft: 8 }}>→ {rawDaysLeft} − {vacDaysOff} = <strong>{daysLeft} effektive Tage</strong></div>
            </div>
          </div>
        )}
      </div>

      {/* Urgent */}
      {urgentModules.length > 0 && (
        <div style={{ background: "#FCEBEB", border: "0.5px solid #F4BFBF", borderRadius: 10, padding: "10px 14px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: "#A32D2D", marginBottom: 6 }}>⚠ Deadline in ≤ 14 Tagen</div>
          {urgentModules.map(m => {
            const dl = plan === "dec" ? (modData[m.id]?.dl_dec !== undefined ? modData[m.id].dl_dec : m.dl_dec) : (modData[m.id]?.dl_sep !== undefined ? modData[m.id].dl_sep : m.dl_sep);
            const c = formatCountdown(daysUntil(dl));
            return <div key={m.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#A32D2D", padding: "2px 0" }}><span>{m.name}</span><span style={{ fontWeight: 500 }}>{c?.label}</span></div>;
          })}
        </div>
      )}

      {/* Diese Woche */}
      {thisWeekHefte.length > 0 && (
        <div style={{ background: "#E6F1FB", border: "0.5px solid #B5D4F4", borderRadius: 10, padding: "10px 14px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 500, color: "#185FA5", marginBottom: 6 }}>Diese Woche fällig</div>
          {thisWeekHefte.map((h, i) => <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#185FA5", padding: "2px 0" }}><span>{h.modName} · Heft {h.idx}: {h.heftName}</span><span style={{ fontWeight: 500, marginLeft: 8 }}>{fmt(h.date)}</span></div>)}
        </div>
      )}

      <ProgressChart modules={effectiveModules} modData={modData} />

      {/* Wahlpflicht */}
      <div style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: 12, overflow: "hidden", marginBottom: 12 }}>
        <div onClick={() => setWpOpen(o => !o)} style={{ padding: "10px 16px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", background: wpSelected.length === 2 ? "var(--color-background-primary)" : "var(--color-background-secondary)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" }}>Wahlpflichtmodule</span>
            <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 500, background: wpSelected.length === 2 ? "#EAF3DE" : "#FAEEDA", color: wpSelected.length === 2 ? "#3B6D11" : "#854F0B" }}>{wpSelected.length}/2 gewählt</span>
            {wpSelected.length < 2 && <span style={{ fontSize: 11, color: "#854F0B" }}>— bitte 2 auswählen</span>}
          </div>
          <span style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>{wpOpen ? "▲" : "▼"}</span>
        </div>
        {wpOpen && (
          <div style={{ padding: "12px 16px 14px", borderTop: "0.5px solid var(--color-border-tertiary)" }}>
            <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 10 }}>Wähle genau 2 Module. Nicht gewählte Module verschwinden aus Statistiken und Chart.</div>
            <div style={{ display: "grid", gap: 6 }}>
              {WP_MODULES.map(mod => {
                const chosen = wpSelected.includes(mod.id);
                const disabled = !chosen && wpSelected.length >= 2;
                return (
                  <div key={mod.id} onClick={() => !disabled && toggleWp(mod.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 8, cursor: disabled ? "not-allowed" : "pointer", background: chosen ? "#EAF3DE" : disabled ? "var(--color-background-secondary)" : "var(--color-background-primary)", border: `0.5px solid ${chosen ? "#C0DD97" : "var(--color-border-tertiary)"}`, opacity: disabled ? 0.45 : 1 }}>
                    <div style={{ width: 18, height: 18, borderRadius: 4, flexShrink: 0, background: chosen ? "#639922" : "transparent", border: `1.5px solid ${chosen ? "#639922" : "var(--color-border-secondary)"}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {chosen && <span style={{ color: "#fff", fontSize: 11 }}>✓</span>}
                    </div>
                    <div style={{ flex: 1 }}>
                      <span style={{ fontSize: 12, fontWeight: chosen ? 500 : 400, color: chosen ? "#3B6D11" : "var(--color-text-primary)" }}>{mod.name}</span>
                      <span style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginLeft: 8 }}>{mod.exam}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {[["all","Alle"],["active","Aktiv"],["open","Offen"],["done","Fertig"],["pflicht","Pflicht"],["wahl","Wahlpflicht"]].map(([key, label]) => (
          <button key={key} onClick={() => setFilter(key)} style={{ fontSize: 11, padding: "4px 12px", borderRadius: 6, cursor: "pointer", border: `0.5px solid ${filter === key ? "#B5D4F4" : "var(--color-border-tertiary)"}`, background: filter === key ? "#E6F1FB" : "transparent", color: filter === key ? "#185FA5" : "var(--color-text-secondary)", fontWeight: filter === key ? 500 : 400 }}>{label}</button>
        ))}
      </div>

      {/* Module list */}
      <div style={{ display: "grid", gap: 8 }}>
        {filtered.map(mod => <ModuleCard key={mod.id} mod={mod} data={modData[mod.id] || {}} plan={plan} onUpdate={p => updateMod(mod.id, p)} allModules={effectiveModules} getStatusFn={getStatus} modData={modData} />)}
      </div>

      {/* Export */}
      <div style={{ marginTop: 14, padding: "12px 14px", borderRadius: 10, background: "var(--color-background-secondary)" }}>
        <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 10, fontWeight: 500 }}>Datensicherung & Export</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <button onClick={exportBackup} style={{ fontSize: 12, padding: "6px 14px", borderRadius: 8, cursor: "pointer", border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontWeight: 500 }}>↓ Backup herunterladen</button>
          <label style={{ fontSize: 12, padding: "6px 14px", borderRadius: 8, cursor: "pointer", border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontWeight: 500 }}>
            ↑ Backup laden
            <input type="file" accept=".json" style={{ display: "none" }} onChange={e => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const parsed = JSON.parse(ev.target.result);
                  if (parsed.modData) {
                    setModData(parsed.modData);
                    if (parsed.plan) setPlan(parsed.plan);
                    if (parsed.wpSelected) setWpSelected(parsed.wpSelected);
                    if (parsed.vacationWeeks !== undefined) setVacationWeeks(parsed.vacationWeeks);
                    save(parsed.modData, parsed.plan || plan, parsed.wpSelected || wpSelected, parsed.vacationWeeks ?? vacationWeeks);
                  } else { alert("Ungültige Backup-Datei."); }
                } catch { alert("Datei konnte nicht gelesen werden."); }
              };
              reader.readAsText(file); e.target.value = "";
            }} />
          </label>
          <button onClick={exportIcs} style={{ fontSize: 12, padding: "6px 14px", borderRadius: 8, cursor: "pointer", border: "0.5px solid #B5D4F4", background: "#E6F1FB", color: "#185FA5", fontWeight: 500 }}>📅 Kalender exportieren (.ics)</button>
          <span style={{ fontSize: 11, color: "var(--color-text-tertiary)", width: "100%", marginTop: 2 }}>
            Backup vor Gerätewechsel herunterladen · .ics öffnet Google/Apple/Outlook Kalender direkt
          </span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// Service Worker registrieren (nur wenn Seite über HTTP/HTTPS geladen wird)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('Service Worker aktiv'))
      .catch(e => console.log('SW Fehler:', e));
  });
}
</script>
</body>
</html>
